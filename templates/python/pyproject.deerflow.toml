# ═══════════════════════════════════════════════════════════════
# DEERFLOW PYTHON PROJECT TEMPLATE
# Comprehensive configuration for mypy, ruff, pytest, coverage
# ═══════════════════════════════════════════════════════════════

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deerflow-project"
version = "0.1.0"
description = "A Deerflow-compliant Python project"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Deerflow Developer" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    # ─── Type Checking ──────────────────────────────────────
    "mypy>=1.8",
    "types-requests>=2.31",

    # ─── Linting & Formatting ───────────────────────────────
    "ruff>=0.4",

    # ─── Testing ────────────────────────────────────────────
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "pytest-asyncio>=0.23",
    "pytest-xdist>=3.5",
    "pytest-timeout>=2.2",
    "pytest-mock>=3.12",
    "httpx>=0.27",

    # ─── Code Quality ───────────────────────────────────────
    "vulture>=2.11",
    "bandit>=1.7",
    "safety>=3.0",

    # ─── Documentation ──────────────────────────────────────
    "mkdocs>=1.5",
    "mkdocs-material>=9.5",
]

# ───────────────────────────────────────────────────────────────
# RUFF — Linter & Formatter
# ───────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py311"
line-length = 100

# Source directories
src = ["src", "tests"]

# Files to exclude
exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "node_modules",
    "venv",
    "*.egg-info",
    "dist",
    "build",
]

[tool.ruff.lint]
# Enable all rules, then selectively disable
select = [
    "F",       # pyflakes
    "E",       # pycodestyle errors
    "W",       # pycodestyle warnings
    "C90",     # mccabe complexity
    "I",       # isort
    "N",       # pep8-naming
    "UP",      # pyupgrade
    "YTT",     # flake8-2020
    "ANN",     # flake8-annotations
    "ASYNC",   # flake8-async
    "BLE",     # flake8-blind-except
    "B",       # flake8-bugbear
    "A",       # flake8-builtins
    "COM",     # flake8-commas
    "C4",      # flake8-comprehensions
    "DTZ",     # flake8-datetimez
    "T10",     # flake8-debugger
    "EM",      # flake8-errmsg
    "FA",      # flake8-future-annotations
    "ISC",     # flake8-implicit-str-concat
    "ICN",     # flake8-import-conventions
    "G",       # flake8-logging-format
    "INP",     # flake8-no-pep420
    "PIE",     # flake8-pie
    "T20",     # flake8-print
    "PYI",     # flake8-pyi
    "PT",      # flake8-pytest-style
    "Q",       # flake8-quotes
    "RSE",     # flake8-raise
    "RET",     # flake8-return
    "SLF",     # flake8-self
    "SLOT",    # flake8-slots
    "SIM",     # flake8-simplify
    "TID",     # flake8-tidy-imports
    "TCH",     # flake8-type-checking
    "ARG",     # flake8-unused-arguments
    "PTH",     # flake8-use-pathlib
    "ERA",     # eradicate
    "PL",      # pylint
    "TRY",     # tryceratops
    "FLY",     # flynt
    "PERF",    # perflint
    "FURB",    # refurb
    "RUF",     # ruff-specific rules
]

ignore = [
    "ANN101",   # Missing type annotation for `self`
    "ANN102",   # Missing type annotation for `cls`
    "PLR0913",  # Too many arguments (we'll manage this per-function)
    "TRY003",   # Long messages in `raise` statements
    "COM812",   # Trailing comma missing (conflicts with formatter)
]

# Per-file ignores
[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",     # assert allowed in tests
    "S106",     # hardcoded password allowed in test fixtures
    "ARG001",   # unused arguments in tests
    "PLR2004",  # magic values in tests are acceptable
    "ANN201",   # return type not required for test helpers
    "ANN001",   # argument types not required for test helpers
]
"__init__.py" = [
    "F401",     # unused imports in __init__.py (re-exports)
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.pylint]
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.flake8-annotations]
suppress-none-returning = true
allow-star-arg-any = false

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
docstring-code-line-length = 100

# ───────────────────────────────────────────────────────────────
# MYPY — Static Type Checking
# ───────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = true

# Error reporting
show_error_codes = true
show_column_numbers = true
show_error_context = true
pretty = true
color_output = true
error_summary = true

# Type checking rules
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

# Disallow untyped constructs
disallow_untyped_defs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
check_untyped_defs = true

# Strictness
no_implicit_optional = true
strict_optional = true
strict_equality = true
extra_checks = true

# Third-party stubs
plugins = [
    "pydantic.mypy",
]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
warn_return_any = false
warn_unused_ignores = false

# ───────────────────────────────────────────────────────────────
# PYTEST — Testing
# ───────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=json",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (may use external services)",
    "e2e: End-to-end tests (full system)",
    "slow: Tests that take > 5 seconds",
    "security: Security-focused tests",
]
timeout = 30
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src"]
branch = true
parallel = true
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/types.py",
    "*/conftest.py",
    "*/migrations/*",
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 80

exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "def __str__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@abstractmethod",
    "@overload",
    "pass",
    "...",
]

[tool.coverage.html]
directory = "htmlcov"
title = "Deerflow Coverage Report"

# ───────────────────────────────────────────────────────────────
# BANDIT — Security Linting
# ───────────────────────────────────────────────────────────────
[tool.bandit]
targets = ["src"]
exclude_dirs = ["tests", "venv", ".venv"]
skips = [
    "B101",   # assert_used (allowed in our codebase)
    "B608",   # hardcoded_sql_expressions (we validate separately)
]

# ───────────────────────────────────────────────────────────────
# VULTURE — Dead Code Detection
# ───────────────────────────────────────────────────────────────
[tool.vulture]
paths = ["src"]
exclude = ["tests/", "venv/", ".venv/", "migrations/"]
ignore_names = [
    "unused_*",
    "_*",
    "main",
]
