# DEERFLOW PRE-COMMIT HOOKS v1.0
# =============================================================================
# Install: pip install pre-commit && pre-commit install
# Update:   pre-commit autoupdate
# Run all:  pre-commit run --all-files
# =============================================================================

minimum_pre_commit_version: "2.20.0"

default_stages: [commit, push]

repos:
  # ===========================================================================
  # DEERFLOW CUSTOM HOOKS
  # ===========================================================================
  - repo: local
    hooks:
      - id: deerflow-file-safety
        name: DEERFLOW File Safety Check
        description: Validates file safety rules including path traversal prevention and file size limits
        entry: scripts/hooks/file-safety.sh
        language: script
        pass_filenames: true
        types: [file]
        verbose: true

      - id: deerflow-no-secrets
        name: DEERFLOW No Secrets Check
        description: Scans staged files for hardcoded secrets, API keys, tokens, and credentials
        entry: scripts/hooks/no-secrets.sh
        language: script
        pass_filenames: true
        types: [text]
        verbose: true

      - id: deerflow-no-any-type
        name: DEERFLOW No `any` Type Check
        description: Rejects TypeScript files containing the `any` type keyword outside of type definitions
        entry: scripts/hooks/no-any-type.sh
        language: script
        types: [typescript]
        verbose: true

      - id: deerflow-file-size
        name: DEERFLOW File Size Check
        description: Enforces maximum file length of 300 lines per Deerflow coding standards
        entry: scripts/hooks/file-size.sh
        language: script
        pass_filenames: true
        types: [text]
        verbose: true

      - id: deerflow-import-order
        name: "DEERFLOW Import Order Check"
        description: "Validates that imports are organized in the correct order: external, internal, relative"
        entry: "scripts/hooks/import-order.sh"
        language: script
        types: [typescript, javascript]
        verbose: true

      - id: deerflow-no-eval
        name: DEERFLOW No eval() Check
        description: Blocks usage of eval(), new Function(), and other dynamic code execution patterns
        entry: scripts/hooks/no-eval.sh
        language: script
        types: [typescript, javascript]
        verbose: true

      - id: deerflow-no-console-log
        name: DEERFLOW No console.log Check
        description: Blocks console.log statements in production code (test files exempt)
        entry: scripts/hooks/no-console-log.sh
        language: script
        types: [typescript, javascript]
        verbose: true

      - id: deerflow-require-jsdoc
        name: DEERFLOW JSDoc Requirement Check
        description: Ensures all exported functions and classes have JSDoc documentation
        entry: scripts/hooks/require-jsdoc.sh
        language: script
        types: [typescript]
        verbose: true

      - id: deerflow-no-todo-comments
        name: DEERFLOW No TODO/FIXME/HACK Check
        description: Blocks TODO, FIXME, HACK, and XXX comments from being committed
        entry: scripts/hooks/no-todo-comments.sh
        language: script
        types: [text]
        verbose: true

      - id: deerflow-no-debug-endpoints
        name: DEERFLOW No Debug Endpoints Check
        description: Blocks debug and diagnostic endpoints not wrapped in environment guards
        entry: scripts/hooks/no-debug-endpoints.sh
        language: script
        types: [typescript, javascript]
        verbose: true

  # ===========================================================================
  # GITSECRETS — Secret Detection
  # ===========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect Secrets (Yelp)
        description: Scans for secrets using entropy analysis and regex pattern matching
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json|\.gitleaks\.toml|security/dependency-check\.sh
        verbose: true

  # ===========================================================================
  # GITLEAKS — Advanced Secret Detection
  # ===========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: GitLeaks Secret Detection
        description: Scans for secrets, API keys, tokens, and credentials using custom Deerflow rules
        verbose: true

  # ===========================================================================
  # GENERAL QUALITY HOOKS
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        name: Check YAML Syntax
        args: ["--unsafe"]

      - id: check-json
        name: Check JSON Syntax

      - id: check-toml
        name: Check TOML Syntax

      - id: check-merge-conflict
        name: Check for Merge Conflicts

      - id: check-added-large-files
        name: Check for Large Files
        args: ["--maxkb=500"]

      - id: check-byte-order-marker
        name: Check for BOM

      - id: check-case-conflict
        name: Check Case Conflicts

      - id: check-executables-have-shebangs
        name: Check Executables Have Shebangs

      - id: check-shebang-scripts-are-executable
        name: Check Shebang Scripts Are Executable

      - id: detect-private-key
        name: Detect Private Keys

      - id: end-of-file-fixer
        name: Fix End of Files

      - id: trailing-whitespace
        name: Fix Trailing Whitespace
        args: ["--markdown-linebreak-ext=md"]

      - id: mixed-line-ending
        name: Fix Mixed Line Endings
        args: ["--fix=lf"]

      - id: no-commit-to-branch
        name: Prevent Direct Commits to Main
        args: ["--branch", "main", "--branch", "master"]

  # ===========================================================================
  # TYPESCRIPT / JAVASCRIPT HOOKS
  # ===========================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: ESLint
        description: Runs ESLint with the Deerflow configuration
        types: [typescript, javascript]
        args: ["--config", ".eslintrc.deerflow.json", "--max-warnings=0"]
        additional_dependencies:
          - "eslint@^8.56.0"
          - "@typescript-eslint/eslint-plugin@^7.0.0"
          - "@typescript-eslint/parser@^7.0.0"
          - "eslint-plugin-security@^2.1.0"
          - "eslint-plugin-no-secrets@^0.8.9"
          - "eslint-plugin-import@^2.29.0"
          - "eslint-plugin-sonarjs@^0.25.0"

  # ===========================================================================
  # MARKDOWN HOOKS
  # ===========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: Markdown Lint
        description: Lints Markdown files for consistent formatting
        args: ["--config", ".markdownlint.json", "--fix"]

  # ===========================================================================
  # COMMIT MESSAGE HOOKS
  # ===========================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        name: Conventional Commits
        description: Enforces Conventional Commits format (feat, fix, docs, etc.)
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, bump]
