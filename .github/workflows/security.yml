# =============================================================================
# DEERFLOW AGENT FRAMEWORK — Security Scanning
# =============================================================================
# Dedicated security workflow. Runs on push/PR and weekly schedule.
# No npm dependency — this is a rules/config framework, not a Node.js app.
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.json'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.sh'
      - '**/*.toml'
      - '**/*.md'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan (config patterns)
        run: |
          # Scan for common secret patterns using grep
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                          # AWS Access Key
            'ghp_[0-9a-zA-Z]{36}'                        # GitHub PAT
            'gho_[0-9a-zA-Z]{36}'                        # GitHub OAuth
            'ghu_[0-9a-zA-Z]{36}'                        # GitHub User token
            'ghs_[0-9a-zA-Z]{36}'                        # GitHub App token
            'glpat-[0-9a-zA-Z\-]{20}'                    # GitLab PAT
            'xox[bpas]-[0-9a-zA-Z\-]{10,}'               # Slack tokens
            'sk-[0-9a-zA-Z]{48}'                         # OpenAI API key
            'AIza[0-9A-Za-z\-_]{35}'                     # Google API key
            'hooks\.slack\.com/services/T[0-9A-Z]{8,}'   # Slack webhook
            'eyJ[0-9a-zA-Z_-]{10,}\.eyJ[0-9a-zA-Z_-]{10,}'  # JWT
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git log --all --full-history -p -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.env*' '*.yaml' '*.yml' '*.toml' '*.sh' 2>/dev/null | grep -E "$pattern" | grep -v 'example\|placeholder\|test\|mock\|dummy\|your-' || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Possible secret pattern found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "No secrets detected"
          fi

  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if gitleaks config exists
        id: config
        run: |
          if [ -f "security/.gitleaks.toml" ]; then
            echo "has_config=true" >> $GITHUB_OUTPUT
          else
            echo "has_config=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate gitleaks config
        if: steps.config.outputs.has_config == 'true'
        run: |
          # Validate TOML syntax
          python3 -c "
          import tomllib, sys
          with open('security/.gitleaks.toml', 'rb') as f:
              data = tomllib.load(f)
          rules = data.get('rules', [])
          print(f'Valid TOML with {len(rules)} secret detection rules')
          assert len(rules) > 0, 'No rules defined in gitleaks config'
          " 2>&1 || {
            echo "::error::security/.gitleaks.toml is invalid or has no rules"
            exit 1
          }

          echo "Deerflow gitleaks config found with $(grep -c '^\[\[rules\]\]' security/.gitleaks.toml) secret detection rules"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check project LICENSE file
        run: |
          if [ ! -f "LICENSE" ]; then
            echo "::error::LICENSE file not found"
            exit 1
          fi
          echo "  OK: LICENSE file exists ($(head -1 LICENSE))"

      - name: Check dependency licenses (optional, only if package.json exists)
        run: |
          if [ -f "package.json" ] && [ -f "package-lock.json" ]; then
            npm ci --prefer-offline 2>/dev/null || npm install 2>/dev/null || true
            npx license-checker --summary 2>/dev/null || echo "  License checker not available"
          else
            echo "  SKIP: No package.json found — this is a rules/config framework"
          fi
        continue-on-error: true
