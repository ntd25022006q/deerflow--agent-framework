# =============================================================================
# DEERFLOW AGENT FRAMEWORK — Security Scanning
# =============================================================================
# Dedicated security workflow. Runs on push/PR and weekly schedule.
# =============================================================================

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: npm audit
        run: npm audit --audit-level=high --production 2>/dev/null || true
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated 2>/dev/null || echo "No outdated check available"
        continue-on-error: true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan (config patterns)
        run: |
          # Scan for common secret patterns using grep
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                          # AWS Access Key
            'ghp_[0-9a-zA-Z]{36}'                        # GitHub PAT
            'gho_[0-9a-zA-Z]{36}'                        # GitHub OAuth
            'ghu_[0-9a-zA-Z]{36}'                        # GitHub User token
            'ghs_[0-9a-zA-Z]{36}'                        # GitHub App token
            'glpat-[0-9a-zA-Z\-]{20}'                    # GitLab PAT
            'xox[bpas]-[0-9a-zA-Z\-]{10,}'               # Slack tokens
            'sk-[0-9a-zA-Z]{48}'                         # OpenAI API key
            'AIza[0-9A-Za-z\-_]{35}'                     # Google API key
            'hooks\.slack\.com/services/T[0-9A-Z]{8,}'   # Slack webhook
            'eyJ[0-9a-zA-Z_-]{10,}\.eyJ[0-9a-zA-Z_-]{10,}'  # JWT
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git log --all --full-history -p -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.env*' '*.yaml' '*.yml' '*.toml' 2>/dev/null | grep -E "$pattern" | grep -v 'example\|placeholder\|test\|mock\|dummy\|your-' || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Possible secret pattern found: $pattern"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "No secrets detected"
          fi

  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if gitleaks config exists
        id: config
        run: |
          if [ -f "security/.gitleaks.toml" ]; then
            echo "has_config=true" >> $GITHUB_OUTPUT
          else
            echo "has_config=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate gitleaks config
        if: steps.config.outputs.has_config == 'true'
        run: |
          echo "Deerflow gitleaks config found with $(grep -c '[[rules]]' security/.gitleaks.toml) secret detection rules"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Check licenses
        run: |
          npx license-checker --summary 2>/dev/null || echo "License checker not available"
        continue-on-error: true
