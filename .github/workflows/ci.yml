# =============================================================================
# DEERFLOW AGENT FRAMEWORK — Main CI/CD Pipeline
# =============================================================================
# Runs on every push and PR. 8 parallel jobs + summary gate.
# Designed to validate the framework repo itself (no package.json).
# =============================================================================

name: Deerflow CI/CD

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_full_audit:
        description: 'Run full audit (security + architecture + performance)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEERFLOW_STRICT: 'true'

jobs:
  # ===========================================================================
  # Job 1: Code Quality (Syntax + Format Checks)
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: TypeScript Check
        run: |
          FAILED=0
          for f in $(find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.git/*'); do
            echo "  Checking: $f"
            npx tsc --noEmit --strict --skipLibCheck --esModuleInterop --moduleResolution node --target ES2020 --module commonjs "$f" 2>&1
            if [ $? -ne 0 ]; then
              echo "  FAIL: $f (TypeScript compilation error)"
              FAILED=1
            else
              echo "  PASS: $f"
            fi
          done
          exit $FAILED

      - name: Check file sizes
        run: |
          MAX_SIZE=300
          FAILED=0
          for f in $(find . -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' -o -name '*.sh' -o -name '*.md' | grep -v node_modules | grep -v '.git' | grep -v 'CHANGELOG.md'); do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt "$MAX_SIZE" ]; then
              echo "::warning file=$f,line=$MAX_SIZE,title=File too large::$f has $LINES lines (max $MAX_SIZE)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Bash syntax check
        run: |
          FAILED=0
          for f in $(find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.git/*'); do
            bash -n "$f" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (syntax error)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: JSON validation
        run: |
          FAILED=0
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -name 'package-lock.json'); do
            python3 -c "import json; json.load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (invalid JSON)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: YAML validation
        run: |
          FAILED=0
          for f in $(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/.github/workflows/*'); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (invalid YAML)"
              FAILED=1
            fi
          done
          exit $FAILED

  # ===========================================================================
  # Job 2: Security Audit
  # ===========================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        run: |
          FAILED=0
          # Common secret patterns
          PATTERNS='(api_key|apikey|secret|password|token|auth)[\s]*[=:][\s]*["\x27][^"\x27]{8,}'
          for f in $(find . -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.json' -o -name '*.env*' -o -name '*.sh' -o -name '*.yaml' -o -name '*.yml' -o -name '*.toml' | grep -v node_modules | grep -v '.git'); do
            MATCHES=$(grep -iE "$PATTERNS" "$f" 2>/dev/null | grep -v 'example\|placeholder\|your-\|TODO\|FIXME\|x_description\|pattern' || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning file=$f,title=Possible secret detected::$(echo "$MATCHES" | head -1)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Check dependency licenses (optional)
        run: |
          if [ -f "package.json" ] && [ -f "package-lock.json" ]; then
            npx license-checker --summary --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;WTFPL' 2>/dev/null || true
            echo "  License check completed"
          else
            echo "  SKIP: No package.json found — this is a rules/config framework, not a Node.js app"
          fi
        continue-on-error: true

      - name: Gitleaks config validation
        run: |
          if [ ! -f "security/.gitleaks.toml" ]; then
            echo "::error::security/.gitleaks.toml not found"
            exit 1
          fi

          # Check it's valid TOML (basic structural checks)
          RULES_COUNT=$(grep -c '^\[\[rules\]\]' security/.gitleaks.toml || echo "0")
          if [ "$RULES_COUNT" -eq 0 ]; then
            echo "::warning::No [[rules]] sections found in security/.gitleaks.toml"
          else
            echo "  OK: $RULES_COUNT secret detection rules found"
          fi

          # Validate TOML syntax with Python
          python3 -c "
          import tomllib
          with open('security/.gitleaks.toml', 'rb') as f:
              data = tomllib.load(f)
          print(f'  OK: Valid TOML with {len(data.get(\"rules\", []))} rules')
          " 2>&1 || {
            echo "::error::security/.gitleaks.toml is not valid TOML"
            exit 1
          }

  # ===========================================================================
  # Job 3: Test Suite (Framework Validation)
  # ===========================================================================
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check all rule files exist and are non-empty
        run: |
          FAILED=0
          RULE_FILES=(
            "core/rules/master-rules.md"
            "core/workflows/workflow-engine.ts"
            "core/workflows/agentic-workflow.md"
            "core/workflows/task-decomposition.md"
            "core/skills/skill-registry.ts"
            "core/skills/agent-skills.md"
            "core/skills/anti-patterns.md"
          )
          for f in "${RULE_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "  FAIL: $f not found"
              FAILED=1
            elif [ ! -s "$f" ]; then
              echo "  FAIL: $f is empty"
              FAILED=1
            else
              LINES=$(wc -l < "$f")
              echo "  PASS: $f ($LINES lines)"
            fi
          done
          exit $FAILED

      - name: Check all hook files pass bash syntax check
        run: |
          FAILED=0
          for f in hooks/*; do
            if [ -f "$f" ]; then
              bash -n "$f" 2>&1
              if [ $? -eq 0 ]; then
                echo "  PASS: $f"
              else
                echo "  FAIL: $f (syntax error)"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

      - name: Check all JSON files are valid
        run: |
          FAILED=0
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -name 'package-lock.json'); do
            python3 -c "import json; json.load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (invalid JSON)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Check all YAML files are valid
        run: |
          FAILED=0
          for f in $(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/.github/workflows/*'); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (invalid YAML)"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Check TypeScript files compile
        run: |
          FAILED=0
          for f in $(find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.git/*'); do
            npx tsc --noEmit --strict --skipLibCheck --esModuleInterop --moduleResolution node --target ES2020 --module commonjs "$f" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f (compilation error)"
              FAILED=1
            fi
          done
          exit $FAILED

  # ===========================================================================
  # Job 4: Build Verification (Framework Integrity)
  # ===========================================================================
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify all referenced files exist
        run: |
          FAILED=0

          # Files referenced in CI workflow checks
          REFERENCED_FILES=(
            "README.md"
            "CLAUDE.md"
            ".cursorrules"
            ".windsurfrules"
            ".github/copilot-instructions.md"
            "core/rules/master-rules.md"
            "config/deerflow.config.json"
            "mcp-tools/config.json"
            "security/.gitleaks.toml"
            "security/pre-commit-config.yaml"
            "security/dependency-check.sh"
            "security/security-rules.md"
            "scripts/init-project.sh"
            "scripts/setup.sh"
            "scripts/quality-check.sh"
            "hooks/pre-commit"
            "hooks/pre-push"
            "hooks/commit-msg"
            "hooks/post-merge"
            "quality-gates/ci-cd/pipeline-config.json"
            "quality-gates/ci-cd/github-actions.yml"
            "quality-gates/linters/tsconfig-strict.json"
            "docs/PROBLEM_ANALYSIS.md"
            "docs/ARCHITECTURE.md"
            "docs/QUICK_START.md"
            "docs/CONFIGURATION.md"
            "CHANGELOG.md"
            "LICENSE"
          )
          for f in "${REFERENCED_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  MISSING: $f"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Check cross-references between rule files
        run: |
          FAILED=0

          # Check that agent rule files reference master-rules.md
          AGENT_RULES=(
            "CLAUDE.md"
            ".cursorrules"
            ".windsurfrules"
            ".github/copilot-instructions.md"
          )
          for f in "${AGENT_RULES[@]}"; do
            if [ -f "$f" ]; then
              if grep -qi 'master-rules' "$f" 2>/dev/null; then
                echo "  OK: $f references master-rules"
              else
                echo "  WARN: $f does not reference master-rules.md"
              fi
            fi
          done

          # Check that config files reference valid paths
          if [ -f "config/deerflow.config.json" ]; then
            python3 -c "
          import json, os
          config = json.load(open('config/deerflow.config.json'))
          # Look for file path references in the config
          for key, value in config.items():
              if isinstance(value, str) and ('/' in value or value.endswith('.md') or value.endswith('.json')):
                  if not os.path.exists(value):
                      print(f'  WARN: Config references missing file: {value} (key: {key})')
          print('  OK: config/deerflow.config.json cross-references checked')
          " 2>&1
          fi

          exit $FAILED

      - name: Verify all scripts are executable
        run: |
          FAILED=0
          SCRIPTS=(
            "scripts/init-project.sh"
            "scripts/setup.sh"
            "scripts/quality-check.sh"
            "security/dependency-check.sh"
            "hooks/pre-commit"
            "hooks/pre-push"
            "hooks/commit-msg"
            "hooks/post-merge"
          )
          for f in "${SCRIPTS[@]}"; do
            if [ -f "$f" ]; then
              if [ -x "$f" ]; then
                echo "  OK: $f is executable"
              else
                echo "  FAIL: $f is NOT executable"
                FAILED=1
              fi
            else
              echo "  MISSING: $f"
              FAILED=1
            fi
          done
          exit $FAILED

  # ===========================================================================
  # Job 5: Architecture Check
  # ===========================================================================
  architecture-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "Checking framework structure..."
          # Verify all Deerflow framework files exist
          REQUIRED_FILES=(
            "README.md"
            "CLAUDE.md"
            ".cursorrules"
            ".windsurfrules"
            ".github/copilot-instructions.md"
            "core/rules/master-rules.md"
            "core/workflows/workflow-engine.ts"
            "core/workflows/agentic-workflow.md"
            "core/workflows/task-decomposition.md"
            "core/skills/skill-registry.ts"
            "core/skills/agent-skills.md"
            "core/skills/anti-patterns.md"
            "config/deerflow.config.json"
            "mcp-tools/config.json"
            "security/.gitleaks.toml"
            "security/pre-commit-config.yaml"
            "security/dependency-check.sh"
            "security/security-rules.md"
            "scripts/init-project.sh"
            "scripts/setup.sh"
            "scripts/quality-check.sh"
            "hooks/pre-commit"
            "hooks/pre-push"
            "hooks/commit-msg"
            "hooks/post-merge"
            "quality-gates/ci-cd/pipeline-config.json"
            "quality-gates/ci-cd/github-actions.yml"
            "quality-gates/linters/tsconfig-strict.json"
            "quality-gates/linters/eslint-rules.js"
            "docs/PROBLEM_ANALYSIS.md"
            "docs/ARCHITECTURE.md"
            "docs/QUICK_START.md"
            "docs/CONFIGURATION.md"
            "CHANGELOG.md"
            "LICENSE"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "::error title=Missing file::$f not found"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "::error::$MISSING required files missing"
            exit 1
          fi

      - name: Check agent rule files reference master-rules
        run: |
          FAILED=0
          AGENT_RULES=(
            "CLAUDE.md"
            ".cursorrules"
            ".windsurfrules"
            ".github/copilot-instructions.md"
          )
          for f in "${AGENT_RULES[@]}"; do
            if [ -f "$f" ]; then
              if grep -qi 'master-rules\|master rules\|single source of truth' "$f" 2>/dev/null; then
                echo "  OK: $f references master-rules"
              else
                echo "  FAIL: $f does not reference master-rules.md"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  # ===========================================================================
  # Job 6: Rule Files Validation
  # ===========================================================================
  rule-validation:
    name: Rule Files Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate rule files exist for all agents
        run: |
          echo "=== Deerflow Rule Files Coverage ==="

          AGENTS=(
            "Cursor:.cursorrules"
            "Windsurf:.windsurfrules"
            "Claude Code:CLAUDE.md"
            "GitHub Copilot:.github/copilot-instructions.md"
            "OpenAI Codex:.codex/instructions.md"
            "Cline:.clinerules"
            "Cline (alt):CLINE.md"
            "Continue.dev:.continue/rules/deerflow-rules.md"
            "Aider:CONVENTIONS.md"
            "Zed:ZED.md"
            "PearAI:.pearai/rules.md"
            "Trae:.trae/rules.md"
            "Melty:.melty/rules.md"
            "Augment:.augment/instructions.md"
            "Amazon Q:.amazonq/rules.md"
            "Roo Code:.roomodes"
            "Universal:.ai-rules"
          )

          ALL_OK=true
          for agent_info in "${AGENTS[@]}"; do
            IFS=':' read -r agent file <<< "$agent_info"
            if [ -f "$file" ]; then
              LINES=$(wc -l < "$file")
              echo "  OK: $agent -> $file ($LINES lines)"
            else
              echo "  MISSING: $agent -> $file"
              ALL_OK=false
            fi
          done

          # Check Cursor 2026 MDC rules
          if [ -d ".cursor/rules" ]; then
            MDC_COUNT=$(find .cursor/rules -name '*.mdc' | wc -l)
            echo "  OK: Cursor 2026 MDC rules ($MDC_COUNT files)"
          fi

          # Check master rules
          if [ -f "core/rules/master-rules.md" ]; then
            LINES=$(wc -l < "core/rules/master-rules.md")
            echo "  OK: Master Rules ($LINES lines - single source of truth)"
          fi

          $ALL_OK

      - name: Validate bash scripts
        run: |
          FAILED=0
          for f in $(find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.git/*'); do
            if [ -f "$f" ]; then
              bash -n "$f" 2>&1
              if [ $? -eq 0 ]; then
                echo "  PASS: $f"
              else
                echo "  FAIL: $f"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

      - name: Validate JSON config files
        run: |
          FAILED=0
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -name 'package-lock.json'); do
            python3 -c "import json; json.load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Validate YAML config files
        run: |
          FAILED=0
          for f in $(find . \( -name '*.yaml' -o -name '*.yml' \) -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/.github/workflows/*'); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1
            if [ $? -eq 0 ]; then
              echo "  PASS: $f"
            else
              echo "  FAIL: $f"
              FAILED=1
            fi
          done
          exit $FAILED

  # ===========================================================================
  # Job 7: Documentation Check
  # ===========================================================================
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check README completeness
        run: |
          echo "Checking README.md..."
          if [ ! -f "README.md" ]; then
            echo "::error::README.md not found"
            exit 1
          fi

          # Check essential sections
          SECTIONS=("Quick Start" "Architecture" "Configuration" "Contributing")
          MISSING=0
          for section in "${SECTIONS[@]}"; do
            if grep -qi "$section" README.md; then
              echo "  OK: Section '$section' found"
            else
              echo "::warning title=Missing section::'$section' section not found in README.md"
              MISSING=$((MISSING + 1))
            fi
          done

          # Check GitHub URL is set (not placeholder)
          if grep -q 'your-username' README.md; then
            echo "::error::README.md still contains placeholder 'your-username'"
            exit 1
          fi
          echo "  OK: No placeholder URLs found"

      - name: Check docs directory
        run: |
          echo "Checking documentation files..."
          DOCS=(
            "docs/PROBLEM_ANALYSIS.md"
            "docs/ARCHITECTURE.md"
            "docs/QUICK_START.md"
            "docs/CONFIGURATION.md"
          )
          for f in "${DOCS[@]}"; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              echo "  OK: $f ($LINES lines)"
            else
              echo "::warning title=Missing doc::$f not found"
            fi
          done

      - name: Check CHANGELOG
        run: |
          if [ -f "CHANGELOG.md" ]; then
            echo "  OK: CHANGELOG.md exists"
          else
            echo "::warning::CHANGELOG.md not found"
          fi

      - name: Check LICENSE
        run: |
          if [ -f "LICENSE" ]; then
            echo "  OK: LICENSE exists ($(head -1 LICENSE))"
          else
            echo "::error::LICENSE file not found"
            exit 1
          fi

  # ===========================================================================
  # Job 8: Git Hooks & Config Validation
  # ===========================================================================
  hooks-validation:
    name: Git Hooks Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify all git hooks exist
        run: |
          HOOKS=("pre-commit" "pre-push" "commit-msg" "post-merge")
          ALL_OK=true
          for hook in "${HOOKS[@]}"; do
            if [ -f "hooks/$hook" ]; then
              bash -n "hooks/$hook" 2>&1 && echo "  PASS: hooks/$hook" || {
                echo "  FAIL: hooks/$hook (syntax error)"
                ALL_OK=false
              }
            else
              echo "  MISSING: hooks/$hook"
              ALL_OK=false
            fi
          done
          $ALL_OK

      - name: Verify config files
        run: |
          # Main config
          if [ -f "config/deerflow.config.json" ]; then
            python3 -c "import json; c=json.load(open('config/deerflow.config.json')); assert c.get('version'), 'Missing version'; assert c.get('strictMode') == True, 'Strict mode must be enabled'"
            echo "  PASS: config/deerflow.config.json"
          fi

          # MCP config
          if [ -f "mcp-tools/config.json" ]; then
            python3 -c "import json; c=json.load(open('mcp-tools/config.json')); assert 'mcpServers' in c or 'servers' in c, 'Missing servers config'"
            echo "  PASS: mcp-tools/config.json"
          fi

          # Editor configs
          for f in .editorconfig .prettierrc .gitignore; do
            if [ -f "$f" ]; then
              echo "  PASS: $f"
            else
              echo "  WARN: $f missing"
            fi
          done

  # ===========================================================================
  # Summary Gate — blocks merge if critical jobs fail
  # ===========================================================================
  ci-summary:
    name: CI Summary Gate
    runs-on: ubuntu-latest
    needs:
      - code-quality
      - security-audit
      - test-suite
      - build-verification
      - architecture-check
      - rule-validation
      - documentation-check
      - hooks-validation
    if: always()
    steps:
      - name: Check results
        run: |
          echo "============================================"
          echo "  DEERFLOW CI/CD PIPELINE SUMMARY"
          echo "============================================"
          echo ""

          RESULTS=(
            "code-quality:${{ needs.code-quality.result }}"
            "security-audit:${{ needs.security-audit.result }}"
            "test-suite:${{ needs.test-suite.result }}"
            "build-verification:${{ needs.build-verification.result }}"
            "architecture-check:${{ needs.architecture-check.result }}"
            "rule-validation:${{ needs.rule-validation.result }}"
            "documentation-check:${{ needs.documentation-check.result }}"
            "hooks-validation:${{ needs.hooks-validation.result }}"
          )

          FAILED=0
          for result in "${RESULTS[@]}"; do
            IFS=':' read -r job status <<< "$result"
            if [ "$status" = "success" ]; then
              echo "  PASS: $job"
            elif [ "$status" = "failure" ]; then
              echo "  FAIL: $job"
              FAILED=$((FAILED + 1))
            else
              echo "  WARN: $job ($status)"
            fi
          done

          echo ""
          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED job(s) failed"
            exit 1
          else
            echo "All jobs passed!"
          fi
